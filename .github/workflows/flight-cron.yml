# Flight notification cron — fires the /api/flight-cron endpoint every 5 min.
#
# Why GitHub Actions and not Vercel's built-in cron: Vercel's scheduler stopped
# invoking /api/flight-cron on this project (only 3 invocations in the last 7
# days despite a `*/5 * * * *` schedule and Pro plan). The function itself works
# fine — when curled directly it returns 200 and fires notifications correctly.
# So we sidestep Vercel's scheduler with a GitHub Actions cron that just hits
# the URL on schedule. Reliable, free, and visible in the Actions tab.
#
# Auth: CRON_SECRET is stored as a GitHub Secret (Settings → Secrets and
# variables → Actions) AND as a Vercel env var. They must match.
#
# Caveats:
# - GitHub Actions cron precision: scheduled runs can skew up to 15 min during
#   peak load. For our use case (5-min polling on flight status) this is fine.
# - Workflow runs are visible to anyone with repo access, so don't put the
#   secret in plain logs.

name: flight-cron

on:
  schedule:
    # Every 5 minutes. GitHub Actions cron uses UTC.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}  # allow manual triggering from the Actions tab

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger flight-cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set in repo secrets"
            exit 1
          fi
          # -f makes curl exit non-zero on HTTP >=400 so the workflow run shows red.
          # -s silent, -S still print errors, --max-time matches the function's
          # maxDuration (60s in vercel.json) plus a small buffer.
          response=$(curl -fsS --max-time 75 \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "User-Agent: github-actions-cron/continuum" \
            "https://gocontinuum.app/api/flight-cron")
          echo "Response: $response"
