# Codemagic CI/CD config — iOS App Store / TestFlight pipeline.
#
# Builds the Capacitor iOS app on a Codemagic macOS runner and uploads to
# TestFlight. All credentials are pulled from Codemagic environment groups —
# nothing sensitive lives in this file.
#
# One-time Codemagic setup before the first build:
#   1. Codemagic → Teams → Personal → Integrations → App Store Connect:
#        - Issuer ID, Key ID, upload the .p8 private key
#        - Reference name: "app_store_connect"
#   2. App Store Connect → Apps → +New App with bundle id app.gocontinuum.continuum
#
# After that, every push to `main` (or manual trigger) ships a new TestFlight
# build automatically — `git push` from iPad → ~15 min → build available.

workflows:
  ios-release:
    name: iOS · TestFlight release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Reference name of the .p8 key uploaded under Codemagic team settings
      # → Integrations → Apple Developer Portal → Manage keys. The newer
      # Codemagic UI merged "App Store Connect" and "Apple Developer Portal"
      # into a single integration; the per-key reference name is what the
      # workflow looks up (was originally documented as "app_store_connect"
      # but actually saved as "Continuum Travel" during setup).
      app_store_connect: Continuum Travel
    environment:
      ios_signing:
        # `bundle_identifier` must match capacitor.config.ts → appId.
        # `distribution_type: app_store` produces an App Store-signed .ipa.
        # Codemagic's xcode-project use-profiles + the App Store Connect
        # integration above auto-creates and downloads the distribution
        # certificate and provisioning profile — no manual cert management.
        distribution_type: app_store
        bundle_identifier: app.gocontinuum.continuum
      groups:
        # APP_STORE_APPLE_ID lives here — the 10-digit numeric Apple ID for
        # the Continuum app record in App Store Connect. Defined in the
        # Codemagic UI (Continuum → Environment variables) so it's not in
        # the repo; the group is referenced by name and pulled at build time.
        - app_store_connect_env
      vars:
        # Capacitor 8 switched from CocoaPods to Swift Package Manager. The
        # generated iOS project is now ios/App/App.xcodeproj with NO
        # .xcworkspace (Pods used to wrap everything in App.xcworkspace).
        # The build step probes for the workspace first (older Capacitor)
        # and falls back to the project file.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 22
      xcode: latest
      cocoapods: default
    # Auto-trigger: every push to main builds a fresh TestFlight build.
    # Note this only uploads to TestFlight (submit_to_testflight: true in
    # publishing) — it does NOT auto-submit to App Store review, so it's safe
    # to keep on even while an App Store review is pending.
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Build the web bundle
        script: |
          npm run build

      - name: Add iOS platform if missing, then sync
        script: |
          # First-ever build won't have ios/ committed — bootstrap it here.
          # Subsequent runs just sync the built web assets.
          if [ ! -d "ios" ]; then
            echo "iOS platform not found — running 'npx cap add ios'"
            npx cap add ios
          fi
          npx cap sync ios

      - name: Regenerate iOS app icon + splash from assets/
        script: |
          # Apple rejected v1 with "placeholder icon" (Guideline 2.3.8). The
          # source PNGs in assets/ are now real branded artwork — re-run the
          # Capacitor Assets generator on every build so the iOS project
          # picks up the latest icon and splash variants.
          # `npm run cap:assets` runs both the icon script and capacitor-assets.
          npm run cap:assets
          echo "iOS app icon generated. Sample of AppIcon.appiconset:"
          ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset/ | head -10

      - name: Patch Info.plist with permission usage descriptions
        script: |
          # Apple rejects apps that call camera / photo-library APIs without a
          # specific, user-facing usage string in Info.plist. These strings
          # appear in the OS permission prompt — they must explain WHY the app
          # needs the access in terms the user understands.
          # We patch idempotently: `plutil -insert` adds the key if absent,
          # `-replace` falls through if it already exists.
          PLIST="ios/App/App/Info.plist"
          set_str() {
            plutil -insert "$1" -string "$2" "$PLIST" 2>/dev/null || \
              plutil -replace "$1" -string "$2" "$PLIST"
          }
          set_str NSCameraUsageDescription "Continuum uses your camera to snap photos of receipts, so we can attach them to your expense reports."
          set_str NSPhotoLibraryUsageDescription "Continuum needs access to your photos so you can pick existing receipt images to attach to expenses."
          set_str NSPhotoLibraryAddUsageDescription "Continuum saves cropped or annotated receipt images back to your photo library when you tap Save."
          echo "Info.plist permission strings:"
          plutil -p "$PLIST" | grep -E "(NSCamera|NSPhotoLibrary)" || true

      - name: Write app entitlements (push + Sign in with Apple)
        script: |
          # The ios/ project is regenerated by `cap sync` each build, so we write
          # the entitlements file fresh and point the App target at it.
          #   - aps-environment            → native APNs push
          #   - com.apple.developer.applesignin → native Sign in with Apple
          # PREREQUISITE: the App ID (app.gocontinuum.continuum) must have BOTH
          # "Push Notifications" AND "Sign in with Apple" capabilities enabled,
          # and the distribution provisioning profile must include them — else
          # codesigning fails. Regenerate + re-fetch the profile after enabling.
          set -e
          ENT="ios/App/App/App.entitlements"
          # printf keeps the XML declaration at column 0 (leading whitespace
          # before <?xml ?> would make the plist invalid).
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '  <key>aps-environment</key>' \
            '  <string>production</string>' \
            '  <key>com.apple.developer.applesignin</key>' \
            '  <array>' \
            '    <string>Default</string>' \
            '  </array>' \
            '  <key>com.apple.developer.usernotifications.time-sensitive</key>' \
            '  <true/>' \
            '</dict>' \
            '</plist>' > "$ENT"
          echo "Wrote $ENT:"; cat "$ENT"
          gem list -i xcodeproj >/dev/null 2>&1 || gem install xcodeproj --no-document
          ruby -e 'require "xcodeproj"; p=Xcodeproj::Project.open("ios/App/App.xcodeproj"); t=p.targets.find{|x| x.name=="App"}; t.build_configurations.each{|c| c.build_settings["CODE_SIGN_ENTITLEMENTS"]="App/App.entitlements"}; p.save; puts "CODE_SIGN_ENTITLEMENTS wired to App/App.entitlements"'

      - name: Declare location-permission strings in Info.plist
        script: |
          # `navigator.geolocation` inside the Capacitor WKWebView triggers the
          # iOS authorization prompt — but iOS will instantly crash the app
          # with "missing NSLocationWhenInUseUsageDescription" if the key isn't
          # declared. The lounge "Walk Here" directions feature is the only
          # caller today. Use PlistBuddy so we don't lose any other keys.
          PLIST="ios/App/App/Info.plist"
          DESC="Continuum uses your location to show walking directions from where you're standing to your airport lounge. Location is only read while you're using the app."
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string $DESC" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription $DESC" "$PLIST"
          echo "NSLocationWhenInUseUsageDescription set."

      - name: Add Google sign-in URL scheme (if configured)
        script: |
          # Native Google sign-in needs the reversed iOS client id registered as
          # a URL scheme in Info.plist. Gated on the env var so the build still
          # works before Google is set up (Apple-only native sign-in until then).
          REV="$GOOGLE_IOS_REVERSED_CLIENT_ID"
          PLIST="ios/App/App/Info.plist"
          if [ -z "$REV" ]; then echo "GOOGLE_IOS_REVERSED_CLIENT_ID not set — skipping Google URL scheme"; exit 0; fi
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REV" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:0:CFBundleURLSchemes:0 $REV" "$PLIST"
          echo "Registered Google URL scheme: $REV"

      - name: Patch AppDelegate for push notifications
        script: |
          # Capacitor's generated AppDelegate does NOT forward the APNs device
          # token to the push plugin. Without these methods, register() gets a
          # token from iOS but the JS 'registration' event never fires — push
          # setup just times out (no token, no error). The @capacitor/push-
          # notifications README says to add them manually; since ios/ is
          # regenerated every build, we inject them here. Idempotent.
          APPDEL="ios/App/App/AppDelegate.swift"
          if grep -q "didRegisterForRemoteNotificationsWithDeviceToken" "$APPDEL"; then
            echo "AppDelegate already forwards APNs callbacks — skipping"
          else
            perl -0pi -e 's/(class AppDelegate: UIResponder, UIApplicationDelegate \{\n)/$1\n    func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {\n        NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)\n    }\n\n    func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {\n        NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)\n    }\n/' "$APPDEL"
            echo "Patched AppDelegate.swift with APNs forwarding"
          fi
          grep -nE "didRegisterForRemoteNotifications|didFailToRegister" "$APPDEL" || echo "WARN: AppDelegate patch did not apply — check the class declaration anchor"

      - name: Set version + build number from Codemagic
        script: |
          # CFBundleVersion = minutes since the Unix epoch. This is the robust
          # choice because it is:
          #   • ALWAYS INCREASING — time only moves forward, so every build is
          #     higher than the last regardless of what Apple reports.
          #   • ALWAYS UNIQUE — builds are minutes (really ~15 min) apart, so two
          #     builds can never compute the same number.
          #   • IMMUNE to the app-store-connect query failing. The old logic
          #     fell back to 0 when the get-latest-*-build-number calls errored
          #     out, then computed build "1" every time → the second upload of a
          #     marketing version collided with the first ("the bundle version
          #     has already been used"). That is exactly what failed the last
          #     upload. A timestamp can't collide that way.
          # ~30 million today, far below the 2^31 ceiling agvtool/Apple accept,
          # and it stays there until well beyond any realistic date.
          #
          # We still query Apple's latest build as a belt-and-suspenders guard:
          # if anything ever sits ABOVE our timestamp, we take that + 1.
          cd ios/App
          TS_BUILD=$(( $(date +%s) / 60 ))
          LATEST_APP_STORE=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          LATEST_TESTFLIGHT=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          LATEST=$(( LATEST_APP_STORE > LATEST_TESTFLIGHT ? LATEST_APP_STORE : LATEST_TESTFLIGHT ))
          NEW_BUILD_NUMBER=$(( TS_BUILD > LATEST ? TS_BUILD : LATEST + 1 ))
          echo "Timestamp build: $TS_BUILD · Latest Apple (AppStore $LATEST_APP_STORE / TF $LATEST_TESTFLIGHT): $LATEST"
          echo "Setting new CFBundleVersion to: $NEW_BUILD_NUMBER"
          agvtool new-version -all "$NEW_BUILD_NUMBER"
          # Marketing version (CFBundleShortVersionString). Once a version is
          # released to the App Store its "train" closes, so new builds need a
          # HIGHER marketing version than the last released one — otherwise the
          # upload fails with error 90062/90186.
          #
          # DO NOT read this from the environment. A stale Codemagic env var
          # (MARKETING_VERSION=1.0.4, left over from an earlier bump) was
          # overriding the default and stamping EVERY build as 1.0.4 — which
          # Apple rejected with 90062 ("must contain a higher version than the
          # previously approved version [1.0.4]") because 1.0.4 is already live.
          # This file is now the single source of truth: bump the literal below
          # whenever you ship a public App Store release.
          # History: 1.0 → 1.0.1 → 1.0.2 → 1.0.3 → 1.0.4 → 1.0.5 all released & closed.
          # 1.0.5 was approved & live 2026-05-20. Bumped to 1.0.6 for the
          # 2026-06-03 release that adds time-sensitive notification entitlements
          # + lazy-loaded page bundles for faster cold start.
          MV="1.0.6"
          echo "Setting marketing version (CFBundleShortVersionString) to: $MV"
          agvtool new-marketing-version "$MV"

      - name: Install CocoaPods (skip on Capacitor 8 SPM)
        script: |
          # Capacitor 8 switched to Swift Package Manager and no longer
          # generates a Podfile. We only run pod install if a Podfile
          # actually exists (older Capacitor 7 templates, custom additions).
          # On Cap 8 / SPM-only projects, this step is a no-op.
          if [ -f "ios/App/Podfile" ]; then
            echo "Podfile found at ios/App/Podfile — running pod install"
            cd ios/App
            pod install
          elif [ -f "ios/Podfile" ]; then
            echo "Podfile found at ios/Podfile — running pod install"
            cd ios
            pod install
          else
            echo "No Podfile found — Capacitor 8 SPM project, skipping pod install."
          fi

      - name: Set up code signing
        script: |
          # Manual signing flow. We tried two prior approaches that both
          # failed on this Apple Developer account:
          #   1. `xcode-project use-profiles` alone — needs an existing cert
          #   2. `app-store-connect fetch-signing-files --create` — Apple's
          #      API silently rejected cert creation
          # Both produced "No matching profiles found" with no diagnosable
          # detail. We now sidestep the API entirely: the cert and profile
          # were generated manually (CSR via OpenSSL → Apple → .p12) and
          # uploaded to Codemagic's team-level Code Signing Identities.
          # `keychain add-certificates` pulls the uploaded .p12 into the
          # runner's keychain; `xcode-project use-profiles` matches the
          # uploaded .mobileprovision to the Xcode project's bundle id and
          # patches the project settings.
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build .ipa
        script: |
          # Prefer .xcworkspace when present (Capacitor 7 + CocoaPods),
          # fall back to .xcodeproj (Capacitor 8 + Swift Package Manager).
          if [ -d "ios/App/App.xcworkspace" ]; then
            echo "Using App.xcworkspace"
            xcode-project build-ipa \
              --workspace "ios/App/App.xcworkspace" \
              --scheme "$XCODE_SCHEME"
          else
            echo "Using App.xcodeproj (Capacitor 8 SPM)"
            xcode-project build-ipa \
              --project "$XCODE_PROJECT" \
              --scheme "$XCODE_SCHEME"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        # Auth uses the integration declared at the top.
        auth: integration
        # `submit_to_testflight: true` makes the build available in TestFlight
        # immediately. Set `submit_to_app_store: true` when you're ready to
        # ship a release for App Store review (typically after TestFlight QA).
        submit_to_testflight: true
        # NOTE: `beta_groups` was previously `- Continuum Internal`, but Apple's
        # API no longer lets you programmatically assign builds to INTERNAL
        # TestFlight groups — the post-step always fails with "Cannot add
        # internal group to a build". Internal testers (anyone on the Apple
        # Developer team) get the build automatically once it's processed, so
        # this line isn't needed for them. Re-add `beta_groups: - {name}` only
        # if you create an EXTERNAL beta group later.
