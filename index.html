<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-title" content="Continuum" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/icon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- SEO / Social -->
    <meta name="description" content="Continuum — Track your airline, hotel, and rental car elite status across every loyalty program." />
    <meta property="og:title" content="Continuum — Elite Status Intelligence Platform" />
    <meta property="og:description" content="Track all your loyalty programs in one place." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Continuum</title>
    <style>
      html, body { margin: 0; padding: 0; background: #ffffff; }
      @media (prefers-color-scheme: dark) { html, body { background: #0f0f0f; } }
      body { padding-top: env(safe-area-inset-top); }
      [data-theme="light"] input[type="date"],
      [data-theme="light"] input[type="time"],
      [data-theme="light"] input[type="datetime-local"],
      [data-theme="light"] input[type="month"],
      [data-theme="light"] input[type="week"] { color-scheme: light; }
      [data-theme="dark"] input[type="date"],
      [data-theme="dark"] input[type="time"],
      [data-theme="dark"] input[type="datetime-local"],
      [data-theme="dark"] input[type="month"],
      [data-theme="dark"] input[type="week"] { color-scheme: dark; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Validate localStorage JSON — corrupted data crashes React before mounting
      (function() {
        var keys = ["continuum_visa_cache","continuum_packing_lists","continuum_custom_pack_items",
          "continuum_lounge_visits","continuum_card_benefit_values","continuum_card_custom_benefits",
          "continuum_expenses_guest"];
        keys.forEach(function(k) {
          try { var v = localStorage.getItem(k); if (v) JSON.parse(v); }
          catch(e) { localStorage.removeItem(k); }
        });
      })();

      // Cache management: purge stale SW caches, reload once if needed.
      // Uses two localStorage keys to prevent infinite reload loops.
      (function() {
        var V = "v20260421e";
        var reloadKey = "_sw_reloading";
        if (localStorage.getItem("_sw_ver") === V) return; // already on latest version

        // If we're mid-reload (second pass), mark as done and stop
        if (localStorage.getItem(reloadKey) === V) {
          localStorage.setItem("_sw_ver", V);
          localStorage.removeItem(reloadKey);
          return;
        }

        // First pass: purge everything, then reload ONCE
        localStorage.setItem(reloadKey, V);

        var done = Promise.resolve();
        if ("serviceWorker" in navigator) {
          done = navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          });
        }
        done.then(function() {
          if ("caches" in window) {
            return caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) { return caches.delete(k); }));
            });
          }
        }).then(function() {
          // All SWs unregistered, all caches cleared — reload to get fresh content
          location.reload();
        });
      })();
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
