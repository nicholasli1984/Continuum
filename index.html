<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-title" content="Continuum" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/icon.svg" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- SEO / Social -->
    <meta name="description" content="Continuum — Track your airline, hotel, and rental car elite status across every loyalty program." />
    <meta property="og:title" content="Continuum — Elite Status Intelligence Platform" />
    <meta property="og:description" content="Track all your loyalty programs in one place." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Continuum</title>
    <style>
      html, body { margin: 0; padding: 0; background: #ffffff; }
      @media (prefers-color-scheme: dark) { html, body { background: #0f0f0f; } }
      body { padding-top: env(safe-area-inset-top); }
      [data-theme="light"] input[type="date"],
      [data-theme="light"] input[type="time"],
      [data-theme="light"] input[type="datetime-local"],
      [data-theme="light"] input[type="month"],
      [data-theme="light"] input[type="week"] { color-scheme: light; }
      [data-theme="dark"] input[type="date"],
      [data-theme="dark"] input[type="time"],
      [data-theme="dark"] input[type="datetime-local"],
      [data-theme="dark"] input[type="month"],
      [data-theme="dark"] input[type="week"] { color-scheme: dark; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- TEMPORARY diagnostic overlay for the Capacitor native black-screen
         issue. Captures the boot sequence + any uncaught error and paints it
         directly on the screen so we don't need a Mac + Safari Web Inspector
         to debug. Remove this whole block once the app is rendering on iOS. -->
    <div id="continuum-debug-overlay" style="position:fixed;top:0;left:0;right:0;max-height:80vh;overflow:auto;background:rgba(255,255,255,0.95);color:#15130F;padding:10px 14px;font-family:'JetBrains Mono',Menlo,Consolas,monospace;font-size:11px;line-height:1.5;z-index:999999;border-bottom:2px solid #C8553D;white-space:pre-wrap;display:none;"></div>
    <script>
      (function() {
        var el = document.getElementById("continuum-debug-overlay");
        var lines = [];
        function log(label, value) {
          var t = new Date().toISOString().substr(11, 12);
          lines.push("[" + t + "] " + label + (value !== undefined ? ": " + value : ""));
          el.textContent = lines.join("\n");
          el.style.display = "block";
        }
        window.__continuumDebug = log;
        log("HTML loaded");
        log("location.protocol", location.protocol);
        log("location.href", location.href);
        log("userAgent", navigator.userAgent.substring(0, 80));
        log("Capacitor", typeof window.Capacitor);
        window.addEventListener("error", function(e) {
          log("window.error", (e.message || "?") + " @ " + (e.filename || "?") + ":" + (e.lineno || "?"));
        });
        window.addEventListener("unhandledrejection", function(e) {
          var msg = e.reason && (e.reason.message || e.reason.toString()) || "unknown";
          log("unhandledrejection", msg);
        });
        // If React hasn't mounted in 5s, flag it
        setTimeout(function() {
          var root = document.getElementById("root");
          if (root && root.children.length === 0) {
            log("React did NOT mount within 5s — root is still empty");
          } else if (root) {
            log("React mounted, root has " + root.children.length + " child(ren)");
          }
        }, 5000);
      })();
    </script>
    <div id="privacy-footer" style="position:fixed;bottom:0;width:100%;text-align:center;padding:10px;font-size:11px;font-family:sans-serif;color:#6B6458;z-index:0;pointer-events:none;"><a href="/privacy.html" style="color:#8B6F47;pointer-events:auto;">Privacy Policy</a></div>
    <script>
      // AGGRESSIVE cache busting — runs BEFORE the app renders.
      // On every page load, fetch the real sw.js from the server to check if
      // there's a newer version. If the SW or caches are stale, nuke everything
      // and hard-reload to guarantee fresh content.
      (function() {
        var V = "__BUILD_TS__";

        // Skip entirely when running inside the Capacitor native shell. The
        // HTML is bundled into the iOS / Android app — there is no CDN, no
        // service worker on the install path, and no stale-cache scenario.
        // Running the script here triggers `display: none` + `location.replace`
        // which left iOS users on a black screen after the splash. Detect via
        // the URL scheme (set by the native WebView) so we run before the
        // Capacitor global is available.
        if (location.protocol === "capacitor:" || location.protocol === "ionic:" || (typeof window.Capacitor !== "undefined" && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())) {
          return;
        }

        // Step 1: If we already verified this build version, skip everything.
        if (localStorage.getItem("_sw_ver") === V) {
          // Still listen for future SW updates during this session
          listenForUpdates();
          return;
        }

        // Step 2: If we're in the middle of a reload cycle, mark as done.
        if (localStorage.getItem("_sw_reloading") === V) {
          localStorage.setItem("_sw_ver", V);
          localStorage.removeItem("_sw_reloading");
          listenForUpdates();
          return;
        }

        // Step 3: Stale version detected — nuke everything and reload.
        localStorage.setItem("_sw_reloading", V);

        // Hide the page immediately to prevent flash of old content
        document.documentElement.style.display = "none";

        var done = Promise.resolve();
        if ("serviceWorker" in navigator) {
          done = navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          });
        }
        done.then(function() {
          if ("caches" in window) {
            return caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) { return caches.delete(k); }));
            });
          }
        }).then(function() {
          // Force a true network fetch by busting the URL cache.
          // Preserve hash so the refresh-button restore (#v=...&t=...) survives.
          location.replace(location.pathname + "?_cb=" + Date.now() + (location.hash || ""));
        });

        // Block further execution — the page will reload
        throw new Error("CACHE_BUST_RELOAD");

        function listenForUpdates() {
          if (!("serviceWorker" in navigator)) return;

          // Listen for SW_UPDATED message from push-sw.js activate handler
          navigator.serviceWorker.addEventListener("message", function(event) {
            if (event.data && event.data.type === "SW_UPDATED") {
              if (!window._swReloading) { window._swReloading = true; window.location.reload(); }
            }
          });

          navigator.serviceWorker.getRegistration().then(function(reg) {
            if (!reg) return;
            if (reg.waiting) {
              reg.waiting.postMessage({ type: "SKIP_WAITING" });
              return;
            }
            // Force check for SW update on every page load
            reg.update().catch(function() {});
            reg.addEventListener("updatefound", function() {
              var nw = reg.installing;
              if (!nw) return;
              nw.addEventListener("statechange", function() {
                if (nw.state === "installed" && navigator.serviceWorker.controller) {
                  nw.postMessage({ type: "SKIP_WAITING" });
                }
              });
            });
          });
          navigator.serviceWorker.addEventListener("controllerchange", function() {
            if (!window._swReloading) { window._swReloading = true; window.location.reload(); }
          });
        }
      })();
    </script>
    <script>
      // Skip service worker registration + version polling on Capacitor native.
      // Same reason as above: bundled HTML, no remote staleness to detect.
      var __isNativeShell = (location.protocol === "capacitor:" || location.protocol === "ionic:" || (typeof window.Capacitor !== "undefined" && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()));
      // Manual SW registration with updateViaCache:'none' to force fresh sw.js fetch
      if (!__isNativeShell && "serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js", { updateViaCache: "none" }).then(function(reg) {
          reg.update().catch(function() {});
        }).catch(function() {});
      }
      // Server-side version check — fetch bypasses SW with cache:'no-store'.
      // If the server's build timestamp differs from ours, we're stale.
      (function() {
        if (__isNativeShell) return;
        var myVersion = "__BUILD_TS__";
        var checking = false;

        function nukeAndReload() {
          document.documentElement.style.display = "none";
          var done = Promise.resolve();
          if ("serviceWorker" in navigator) {
            done = navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            });
          }
          done.then(function() {
            if ("caches" in window) {
              return caches.keys().then(function(keys) {
                return Promise.all(keys.map(function(k) { return caches.delete(k); }));
              });
            }
          }).then(function() {
            localStorage.removeItem("_sw_ver");
            localStorage.removeItem("_sw_reloading");
            location.replace("/?_cb=" + Date.now() + (location.hash || ""));
          });
        }

        function checkVersion() {
          if (checking) return;
          checking = true;
          fetch("/build-version.json?_=" + Date.now(), { cache: "no-store" })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              checking = false;
              if (data.v && data.v !== myVersion) nukeAndReload();
            })
            .catch(function() { checking = false; });
        }

        // Initial check on first load
        checkVersion();

        // BFCache: when restored from back/forward cache, re-check
        window.addEventListener("pageshow", function(e) {
          if (e.persisted) checkVersion();
        });

        // Tab becomes visible again (returning from another tab/app) — re-check
        document.addEventListener("visibilitychange", function() {
          if (document.visibilityState === "visible") checkVersion();
        });
      })();
    </script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
