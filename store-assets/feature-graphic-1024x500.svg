<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Warm dark background gradient (subtle, top-left lighter) -->
    <radialGradient id="bg" cx="20%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#211D17"/>
      <stop offset="60%" stop-color="#15130F"/>
      <stop offset="100%" stop-color="#0E0D0A"/>
    </radialGradient>

    <!-- Gold gradient (matches existing logo) -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#F0D78C"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>

    <!-- Terracotta accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4742D"/>
      <stop offset="100%" stop-color="#A04518"/>
    </linearGradient>

    <!-- Subtle paper texture for cards -->
    <linearGradient id="cardSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22201A"/>
      <stop offset="100%" stop-color="#1C1A14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle grid hairlines (top and bottom, editorial) -->
  <line x1="0" y1="60" x2="1024" y2="60" stroke="#2A2620" stroke-width="1"/>
  <line x1="0" y1="440" x2="1024" y2="440" stroke="#2A2620" stroke-width="1"/>

  <!-- Top eyebrow row -->
  <text x="64" y="40"
    font-family="'JetBrains Mono', 'SF Mono', monospace"
    font-size="11" letter-spacing="3"
    fill="#C8553D">CONTINUUM</text>
  <text x="64" y="40"
    font-family="'JetBrains Mono', 'SF Mono', monospace"
    font-size="11" letter-spacing="3"
    fill="#857A66" text-anchor="end" transform="translate(960, 0)">S 01 · TRAVEL HQ</text>

  <!-- Infinity mark (small, top-left of headline) -->
  <g transform="translate(64, 110)">
    <path d="M 0,0
             C 0,-12 14,-22 28,-12
             L 38,-3
             C 44,2 52,2 58,-3
             L 68,-12
             C 82,-22 96,-12 96,0
             C 96,12 82,22 68,12
             L 58,3
             C 52,-2 44,-2 38,3
             L 28,12
             C 14,22 0,12 0,0 Z"
      fill="none" stroke="url(#goldGrad)" stroke-width="1.6" opacity="0.95"/>
  </g>

  <!-- Headline -->
  <text x="64" y="220"
    font-family="'Fraunces', 'Times New Roman', serif"
    font-size="72" font-weight="300" letter-spacing="-3"
    fill="#F4F1EC">Your travel HQ.</text>

  <!-- Italic subtitle -->
  <text x="64" y="278"
    font-family="'Fraunces', 'Times New Roman', serif"
    font-size="26" font-style="italic" font-weight="400" letter-spacing="-0.5"
    fill="#C9A84C">Trips, expenses, status — one app.</text>

  <!-- Three feature pills (mono, editorial) -->
  <g font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="11" letter-spacing="2">
    <g transform="translate(64, 340)">
      <rect width="170" height="32" fill="none" stroke="#857A66" stroke-width="1"/>
      <text x="14" y="21" fill="#F4F1EC">FORWARD A BOOKING</text>
    </g>
    <g transform="translate(244, 340)">
      <rect width="160" height="32" fill="none" stroke="#857A66" stroke-width="1"/>
      <text x="14" y="21" fill="#F4F1EC">SNAP A RECEIPT</text>
    </g>
    <g transform="translate(414, 340)">
      <rect width="160" height="32" fill="none" stroke="#857A66" stroke-width="1"/>
      <text x="14" y="21" fill="#F4F1EC">SPLIT THE TAB</text>
    </g>
  </g>

  <!-- Bottom byline -->
  <text x="64" y="475"
    font-family="'Fraunces', 'Times New Roman', serif"
    font-size="14" font-style="italic"
    fill="#857A66">Elevate every journey.</text>
  <text x="960" y="475"
    font-family="'JetBrains Mono', 'SF Mono', monospace"
    font-size="11" letter-spacing="2"
    fill="#857A66" text-anchor="end">GOCONTINUUM.APP</text>

  <!-- ── Right-side stack: 3 mini cards mimicking the actual UI ── -->

  <!-- Card 1 (back): Flight segment -->
  <g transform="translate(672, 88) rotate(-5)">
    <rect width="270" height="92" fill="url(#cardSurface)" stroke="#2A2620" stroke-width="1"/>
    <rect x="0" y="0" width="3" height="92" fill="#C8553D"/>
    <text x="18" y="22"
      font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.4"
      fill="#C8553D">FLIGHT · CONFIRMED</text>
    <text x="18" y="50"
      font-family="'Fraunces', serif" font-size="20" letter-spacing="-0.5"
      fill="#F4F1EC">AA 1234 · BNA → LGA</text>
    <text x="18" y="74"
      font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1"
      fill="#857A66">APR 26 · 3:45 PM · GATE B6</text>
  </g>

  <!-- Card 2 (middle): Receipt -->
  <g transform="translate(720, 200) rotate(2)">
    <rect width="260" height="84" fill="url(#cardSurface)" stroke="#2A2620" stroke-width="1"/>
    <rect x="0" y="0" width="3" height="84" fill="#B8924A"/>
    <text x="18" y="22"
      font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.4"
      fill="#B8924A">INBOX · AUTO-FILLED</text>
    <g transform="translate(18, 32)">
      <text y="22"
        font-family="'Fraunces', serif" font-size="18" letter-spacing="-0.4"
        fill="#F4F1EC">Lyft</text>
      <text x="222" y="22" text-anchor="end"
        font-family="'Fraunces', serif" font-size="18"
        fill="#F4F1EC">$24.50</text>
      <text y="42"
        font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1"
        fill="#857A66">APR 28 · TRANSPORT</text>
    </g>
  </g>

  <!-- Card 3 (front): Voucher with countdown -->
  <g transform="translate(680, 320) rotate(-3)">
    <rect width="280" height="84" fill="url(#cardSurface)" stroke="#2A2620" stroke-width="1"/>
    <rect x="0" y="0" width="3" height="84" fill="#6B7A5A"/>
    <text x="18" y="22"
      font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1.4"
      fill="#6B7A5A">VOUCHER · 6 MO LEFT</text>
    <text x="18" y="50"
      font-family="'Fraunces', serif" font-size="19" letter-spacing="-0.4"
      fill="#F4F1EC">BA Travel Together</text>
    <text x="262" y="50" text-anchor="end"
      font-family="'JetBrains Mono', monospace" font-size="11"
      fill="#857A66">~$1,500</text>
    <text x="18" y="72"
      font-family="'Fraunces', serif" font-size="12" font-style="italic"
      fill="#857A66">Expires Oct 15, 2026</text>
  </g>
</svg>
