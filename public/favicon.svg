<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E1A0D"/>
      <stop offset="100%" stop-color="#D4742D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#F0D78C"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Infinity mark + aircraft, scaled and centered -->
  <g transform="translate(50,50) scale(0.40)">
    <!-- Outer infinity stroke in white -->
    <path d="M -105,0 C -105,-42 -70,-48 -50,-48 C -25,-48 -10,-25 0,-10 C 10,-25 25,-48 50,-48 C 70,-48 105,-42 105,0 C 105,42 70,48 50,48 C 25,48 10,25 0,10 C -10,25 -25,48 -50,48 C -70,48 -105,42 -105,0 Z"
      fill="none" stroke="#fff" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>
    <!-- Inner gold stroke -->
    <path d="M -93,0 C -93,-32 -65,-37 -50,-37 C -30,-37 -13,-18 0,-4 C 13,-18 30,-37 50,-37 C 65,-37 93,-32 93,0 C 93,32 65,37 50,37 C 30,37 13,18 0,4 C -13,18 -30,37 -50,37 C -65,37 -93,32 -93,0 Z"
      fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <!-- Diamond accent at crossover -->
    <polygon points="0,-7 5,0 0,7 -5,0" fill="url(#gold)" opacity="0.95"/>
    <!-- Aircraft silhouette -->
    <g transform="translate(85,-30) rotate(-35)">
      <path d="M 0,0 L 4,-2 L 18,-2 L 22,0 L 18,2 L 4,2 Z" fill="#fff" opacity="0.95"/>
      <path d="M 8,-2 L 12,-8 L 14,-8 L 12,-2 Z" fill="#fff" opacity="0.75"/>
      <path d="M 8,2 L 12,8 L 14,8 L 12,2 Z" fill="#fff" opacity="0.75"/>
      <path d="M 2,-1 L 0,-5 L 2,-5 L 4,-1 Z" fill="#fff" opacity="0.55"/>
    </g>
    <!-- Trail dots -->
    <circle cx="65" cy="-35" r="2" fill="#fff" opacity="0.4"/>
    <circle cx="57" cy="-32" r="1.5" fill="#fff" opacity="0.25"/>
  </g>

  <!-- Subtle border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="#fff" stroke-width="1" opacity="0.1"/>
</svg>
